<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Radioworks Premium Player - Widget</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --text: #fff;
      --subtext: rgba(255,255,255,0.7);
      --glass: rgba(0,0,0,0.45);
      --title-color: #fff;
      --slider-track: linear-gradient(90deg, #ffffff 0%, #d0d0d0 100%);
      --slider-thumb: #ffffff;
      --slider-thumb-glow: rgba(255,255,255,0.6);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Montserrat", system-ui, sans-serif;
      background: transparent;
      overflow: hidden;
      color: var(--text);
    }

    .widget-wrap {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      background: var(--glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 14px;
      max-width: 460px;
      margin: 0;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .align-left { margin-right: auto; }
    .align-center { margin-left: auto; margin-right: auto; }
    .align-right { margin-left: auto; }

    .art-wrap {
      width: 120px;
      height: 120px;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
      background: #222;
    }

    .art-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.4s ease;
    }

    .art-img.fade { opacity: 0; }

    .meta-wrap {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .onair-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--subtext);
    }

    .onair-label span { color: #ff9c35; }

    .track-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
      word-break: break-word;
      color: var(--title-color);
    }

    .play-btn {
      width: 100%;
      max-width: 120px;
      height: 36px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      background: #fff;
      color: #000;
    }

    .play-btn.active {
      background: #e5e5e5;
    }

    .volume-wrap {
      width: 100%;
      max-width: 160px;
      display: none;
    }

    @media (min-width: 1025px) {
      .volume-wrap { display: block; }
    }

    .volume-bar {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      cursor: pointer;
      background: var(--slider-track);
      outline: none;
      border: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .volume-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--slider-thumb);
      margin-top: -4px;
      transition: box-shadow 0.15s ease, transform 0.15s ease;
    }

    .volume-bar::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 6px var(--slider-thumb-glow);
      transform: scale(1.05);
    }

    .powered-by {
      margin-top: 4px;
      font-size: 11px;
      opacity: 0.85;
    }

    .powered-by a {
      color: #4da3ff;
      text-decoration: underline;
      font-weight: 600;
    }

    @media (max-width: 480px) {
      .widget-wrap { flex-direction: column; max-width: 100%; padding: 16px; }
      .art-wrap { width: 160px; height: 160px; }
      .meta-wrap { align-items: center; text-align: center; }
    }
  </style>
</head>

<body>

<div class="widget-wrap" id="playerArea">

  <div class="art-wrap">
    <img id="artwork" class="art-img" src="" alt="">
  </div>

  <div class="meta-wrap">
    <div class="onair-label"><span>●</span> NOW PLAYING</div>

    <div id="trackTitle" class="track-title">Loading…</div>

    <button id="playButton" class="play-btn">PLAY</button>

    <div class="volume-wrap">
      <input id="volumeBar" class="volume-bar" type="range" min="0" max="100" value="100">
    </div>

    <div class="powered-by">
      <a href="https://radioworks.studio" target="_blank">Powered by Radioworks</a>
    </div>
  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const streamURL = params.get("stream");
const metaURL = params.get("meta");
const licenseKey = params.get("license");
const align = params.get("align") || "center";

document.getElementById("playerArea").classList.add(`align-${align}`);

const licenseURL = "https://raw.githubusercontent.com/radioworks01/premium-radio-player-widget/main/licenses.json";

async function checkLicense() {
  try {
    const res = await fetch(licenseURL + "?_=" + Date.now());
    const data = await res.json();

    if (!data.licenses || !Array.isArray(data.licenses)) return showInvalid();

    const license = data.licenses.find(l => l.key === licenseKey);
    if (!license) return showInvalid();

    if (license.expires !== "never") {
      const today = new Date();
      const expiry = new Date(license.expires);
      if (today > expiry) return showInvalid();
    }

    return true;

  } catch {
    return showInvalid();
  }
}

function showInvalid() {
  document.getElementById("playerArea").innerHTML = `
    <div style="width:100%;text-align:center;padding:40px 20px;color:#fff;">
      <h1 style="font-size:24px;margin-bottom:10px;">Invalid License</h1>
      <p style="font-size:14px;opacity:0.7;">This Radioworks Premium Player is not licensed.</p>
    </div>
  `;
  return false;
}

function initPlayer() {
  const audio = new Audio(streamURL);
  audio.type = "audio/aacp";

  const playButton = document.getElementById("playButton");
  const volumeBar = document.getElementById("volumeBar");
  const titleEl = document.getElementById("trackTitle");
  const artworkEl = document.getElementById("artwork");

  const FALLBACK_ART = "https://i.ibb.co/Jj588RKm/Live-Stream-Default-Album-Art.png";
  artworkEl.src = FALLBACK_ART;

  playButton.addEventListener("click", async () => {
    if (audio.paused) {
      try {
        await audio.play();
      } catch (err) {
        console.log("Playback blocked:", err);
      }
    } else {
      audio.pause();
      audio.currentTime = 0;
    }
  });

  audio.addEventListener("play", () => {
    playButton.textContent = "STOP";
    playButton.classList.add("active");
  });

  audio.addEventListener("pause", () => {
    playButton.textContent = "PLAY";
    playButton.classList.remove("active");
  });

  audio.volume = volumeBar ? volumeBar.value / 100 : 1.0;

  if (volumeBar) {
    volumeBar.addEventListener("input", () => {
      audio.volume = volumeBar.value / 100;
    });
  }

  // 🧠 Artwork helpers
  function cleanTitle(title) {
    return title
      .replace(/\(.*?\)/g, "")
      .replace(/\[.*?\]/g, "")
      .replace(/feat\.?.*/i, "")
      .replace(/ft\.?.*/i, "")
      .replace(/-/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function splitArtistTrack(title) {
    const parts = title.split(" - ");
    if (parts.length >= 2) {
      return {
        artist: parts[0].trim(),
        track: parts.slice(1).join(" ").trim()
      };
    }
    return { artist: "", track: title };
  }

  async function searchiTunes(term) {
    try {
      const res = await fetch(
        `https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=song&limit=1`
      );
      const data = await res.json();

      if (data.results && data.results.length > 0) {
        return data.results[0].artworkUrl100.replace("100x100bb.jpg", "1200x1200bb.jpg");
      }
    } catch {}

    return null;
  }

  async function updateArtwork(title) {
    if (!title) {
      artworkEl.src = FALLBACK_ART;
      return;
    }

    const cleaned = cleanTitle(title);
    const { artist, track } = splitArtistTrack(title);

    let art = await searchiTunes(cleaned);

    if (!art && artist && track) {
      art = await searchiTunes(`${artist} ${track}`);
    }

    if (!art && track) {
      art = await searchiTunes(track);
    }

    if (!art) {
      artworkEl.src = FALLBACK_ART;
      return;
    }

    artworkEl.classList.add("fade");
    setTimeout(() => {
      artworkEl.src = art;
      artworkEl.classList.remove("fade");
    }, 200);
  }

  let lastTitle = "";

  async function fetchMetadata() {
    try {
      const res = await fetch(metaURL + "?_=" + Date.now());
      const data = await res.json();

      let title = data.icestats?.source?.title || "";

      if (!title) {
        titleEl.textContent = "Live Stream";
        artworkEl.src = FALLBACK_ART;
        return;
      }

      if (title !== lastTitle) {
        titleEl.textContent = title;
        updateArtwork(title);
        lastTitle = title;
      }

    } catch (err) {
      console.log("Metadata error:", err);
      titleEl.textContent = "Live Stream";
      artworkEl.src = FALLBACK_ART;
    }
  }

  if (metaURL) {
    fetchMetadata();
    setInterval(fetchMetadata, 5000);
  } else {
    titleEl.textContent = "Live Stream";
    artworkEl.src = FALLBACK_ART;
  }
}

checkLicense().then(valid => {
  if (valid) initPlayer();
});
</script>

</body>
</html>
