<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Radioworks Premium Player - Widget</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --text: #fff;
      --subtext: rgba(255,255,255,0.7);
      --glass: rgba(0,0,0,0.25);
      --title-color: #fff;
      --slider-track: linear-gradient(90deg, #ffffff 0%, #d0d0d0 100%);
      --slider-thumb: #ffffff;
      --slider-thumb-glow: rgba(255,255,255,0.6);
    }

    /* ----------------------------- */
    /* THEMES                       */
    /* ----------------------------- */

    /* LIGHT (default) */
    .theme-light {
      --text: #ffffff;
      --subtext: rgba(255,255,255,0.7);
      --glass: rgba(255,255,255,0.15);
      --title-color: #ffffff;
      --slider-track: linear-gradient(90deg, #ffffff 0%, #d0d0d0 100%);
      --slider-thumb: #ffffff;
      --slider-thumb-glow: rgba(255,255,255,0.6);
    }

    /* DARK */
    .theme-dark {
      --text: #000000;
      --subtext: rgba(0,0,0,0.6);
      --glass: rgba(255,255,255,0.25);
      --title-color: #000000;
      --slider-track: linear-gradient(90deg, #444 0%, #222 100%);
      --slider-thumb: #000000;
      --slider-thumb-glow: rgba(0,0,0,0.4);
    }

    .theme-dark .widget-wrap {
      background: rgba(255,255,255,0.4);
    }

    /* RETRO */
    .theme-retro {
      --text: #3b2f2f;
      --subtext: rgba(59,47,47,0.7);
      --glass: rgba(222,184,135,0.35);
      --title-color: #3b2f2f;
      --slider-track: linear-gradient(90deg, #a67c52 0%, #8b5e34 100%);
      --slider-thumb: #5c3d2e;
      --slider-thumb-glow: rgba(92,61,46,0.4);
    }

    .theme-retro .widget-wrap {
      background: rgba(222,184,135,0.45);
      border: 2px solid #8b5e34;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    .theme-retro .art-wrap {
      border-radius: 4px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.5);
    }

    .theme-retro .play-btn {
      background: #8b5e34;
      color: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }

    /* ----------------------------- */
    /* ORIGINAL STYLES              */
    /* ----------------------------- */

    body {
      margin: 0;
      padding: 0;
      font-family: "Montserrat", system-ui, sans-serif;
      background: transparent;
      overflow: hidden;
      color: var(--text);
    }

    .widget-wrap {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 18px;
      padding: 12px 16px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      max-width: 480px;
      margin: 0;
    }

    .align-left { margin-right: auto; }
    .align-center { margin-left: auto; margin-right: auto; }
    .align-right { margin-left: auto; }

    .art-wrap {
      width: 150px;
      height: 150px;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .art-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.4s ease;
    }

    .art-img.fade { opacity: 0; }

    .fallback-chip { display: none; }

    .meta-wrap {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .onair-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--subtext);
    }

    .onair-label span { color: #ff9c35; }

    .track-title {
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      line-height: 1.2;
      word-break: break-word;
      color: var(--title-color);
    }

    .track-sub {
      font-size: 12px;
      color: var(--subtext);
    }

    .play-btn {
      width: 100%;
      max-width: 120px;
      height: 36px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      background: #fff;
      color: #000;
      box-shadow: 0 6px 14px rgba(0,0,0,0.3);
    }

    .volume-wrap { width: 100%; max-width: 160px; }

    .volume-bar {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      cursor: pointer;
      background: var(--slider-track);
      outline: none;
      border: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .volume-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--slider-thumb);
      margin-top: -4px;
      transition: box-shadow 0.15s ease, transform 0.15s ease;
    }

    .volume-bar::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 6px var(--slider-thumb-glow);
      transform: scale(1.05);
    }

    .powered-by {
      margin-top: 6px;
      font-size: 11px;
      opacity: 0.85;
    }

    .powered-by a {
      color: #4da3ff;
      text-decoration: underline;
      font-weight: 600;
      cursor: pointer;
    }

    @media (max-width: 1024px) { .volume-wrap { display: none; } }

    @media (max-width: 480px) {
      .widget-wrap { flex-direction: column; max-width: 100%; padding: 16px; }
      .art-wrap { width: 180px; height: 180px; }
      .meta-wrap { align-items: center; text-align: center; }
    }

    @media screen and (min-width: 1025px) {
      .volume-wrap { display: block !important; }
    }
  </style>
</head>

<body>

<div class="widget-wrap" id="playerArea">

  <div class="art-wrap">
    <img id="artwork" class="art-img" src="" alt="">
    <div id="fallbackChip" class="fallback-chip">NO ARTWORK</div>
  </div>

  <div class="meta-wrap">
    <div class="onair-label"><span>●</span> NOW PLAYING</div>

    <div id="trackTitle" class="track-title">Loading…</div>
    <div id="trackSub" class="track-sub"></div>

    <button id="playButton" class="play-btn">PLAY</button>

    <div class="volume-wrap">
      <input id="volumeBar" class="volume-bar" type="range" min="0" max="100" value="100">
    </div>

    <div class="powered-by">
      <a href="https://radioworks.stuio" target="_blank">Powered by Radioworks</a>
    </div>
  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const streamURL = params.get("stream");
const metaURL = params.get("meta");
const licenseKey = params.get("license");
const align = params.get("align") || "center";
const theme = params.get("theme") || "light";

/* Apply theme */
document.body.classList.add(`theme-${theme}`);

const licenseURL = "https://raw.githubusercontent.com/radioworks01/premium-radio-player-widget/main/licenses.json";

async function checkLicense() {
  try {
    const res = await fetch(licenseURL + "?_=" + Date.now());
    const data = await res.json();

    if (!data.licenses || !Array.isArray(data.licenses)) return showInvalid("data");

    const license = data.licenses.find(l => l.key === licenseKey);
    if (!license) return showInvalid("invalid");

    if (license.expires !== "never") {
      const today = new Date();
      const expiry = new Date(license.expires);
      if (today > expiry) return showInvalid("expired");
    }

    return true;

  } catch {
    return showInvalid("data");
  }
}

function showInvalid(reason) {
  let title = "";
  let message = "";

  if (reason === "expired") {
    title = "License Expired";
    message = `The license for the Radioworks Premium Player has expired. Renew your licence at 
      <a href="https://radioworks.studio" target="_blank" style="color:#4da3ff;">radioworks.studio</a>.`;
  } else {
    title = "Invalid License";
    message = "This Radioworks Premium Player is not licensed.";
  }

  document.getElementById("playerArea").innerHTML = `
    <div style="width:100%;text-align:center;padding:40px 20px;color:#fff;">
      <h1 style="font-size:24px;margin-bottom:10px;">${title}</h1>
      <p style="font-size:14px;opacity:0.7;">${message}</p>
    </div>
  `;

  return false;
}

function initPlayer() {
  const audio = new Audio(streamURL);
  const playButton = document.getElementById("playButton");
  const volumeBar = document.getElementById("volumeBar");
  const titleEl = document.getElementById("trackTitle");
  const subEl = document.getElementById("trackSub");
  const artworkEl = document.getElementById("artwork");
  const fallbackChip = document.getElementById("fallbackChip");

  const FALLBACK_ART = "https://i.ibb.co/Jj588RKm/Live-Stream-Default-Album-Art.png";

  let lastSentTitle = "";
  let lastSentArtist = "";
  let lastSentArt = "";

  document.getElementById("playerArea").classList.add(`align-${align}`);

  artworkEl.src = FALLBACK_ART;
  fallbackChip.style.display = "none";

  playButton.addEventListener("click", () => {
    if (audio.paused) {
      audio.play();
      playButton.textContent = "PAUSE";
    } else {
      audio.pause();
      playButton.textContent = "PLAY";
    }
  });

  audio.volume = volumeBar ? volumeBar.value / 100 : 1.0;

  if (volumeBar) {
    volumeBar.addEventListener("input", () => {
      audio.volume = volumeBar.value / 100;
    });
  }

  function sendHistoryUpdate(title, artist, artUrl) {
    if (!title) return;

    if (
      title === lastSentTitle &&
      artist === lastSentArtist &&
      artUrl === lastSentArt
    ) {
      return;
    }

    lastSentTitle = title;
    lastSentArtist = artist;
    lastSentArt = artUrl;

    const workerUrl = "https://radiohistoryworker.sthelensliveradio.workers.dev/update";
    const url =
      workerUrl +
      `?title=${encodeURIComponent(title)}` +
      `&artist=${encodeURIComponent(artist || "")}` +
      `&art=${encodeURIComponent(artUrl || "")}`;

    fetch(url).catch(() => {});
  }

  function showFallback() {
    artworkEl.classList.add("fade");
    setTimeout(() => {
      artworkEl.src = FALLBACK_ART;
      artworkEl.classList.remove("fade");
    }, 200);
    fallbackChip.style.display = "none";
  }

  async function updateArtwork(title, artist) {
    const query = encodeURIComponent(title.trim());

    if (!query) {
      showFallback();
      sendHistoryUpdate(title, artist, FALLBACK_ART);
      return;
    }

    try {
      const res = await fetch(
        `https://itunes.apple.com/search?term=${query}&entity=song&limit=1`
      );
      const data = await res.json();

      let finalArt = FALLBACK_ART;

      if (data.results && data.results.length > 0) {
        let art = data.results[0].artworkUrl100;
        art = art.replace("100x100bb.jpg", "1200x1200bb.jpg");
        finalArt = art;

        if (artworkEl.src !== art) {
          artworkEl.classList.add("fade");
          setTimeout(() => {
            artworkEl.src = art;
            artworkEl.classList.remove("fade");
          }, 200);
        }

        fallbackChip.style.display = "none";
      } else {
        showFallback();
      }

      sendHistoryUpdate(title, artist, finalArt);

    } catch {
      showFallback();
      sendHistoryUpdate(title, artist, FALLBACK_ART);
    }
  }

  async function fetchMetadata() {
    try {
      const res = await fetch(metaURL + "?_=" + Date.now());
      const data = await res.json();

      let source = data.icestats && data.icestats.source;
      if (Array.isArray(source)) source = source[0];
      source = source || {};

      let raw = source.title || "";

      if (!raw.trim()) {
        titleEl.textContent = "Live Stream";
        subEl.textContent = "";
        showFallback();
        return;
      }

      const cleanTitle = raw.trim();

      titleEl.textContent = cleanTitle;
      subEl.textContent = "";

      updateArtwork(cleanTitle, "");

    } catch {
      titleEl.textContent = "Live Stream";
      subEl.textContent = "";
      showFallback();
    }
  }

  if (metaURL) {
    fetchMetadata();
    setInterval(fetchMetadata, 5000);
  } else {
    titleEl.textContent = "Live Stream";
    subEl.textContent = "";
    showFallback();
  }
}

checkLicense().then(valid => {
  if (valid) initPlayer();
});
</script>

</body>
</html>
