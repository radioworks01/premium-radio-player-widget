<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Radioworks Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: #fff;
    }

    .player-wrap {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .player-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(10, 10, 15, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.06);
      max-width: 380px;
      width: 100%;
      color: #fff;
    }

    .player-card.light {
      background: rgba(245, 245, 245, 0.96);
      color: #111;
      border-color: rgba(0, 0, 0, 0.06);
    }

    .artwork {
      width: 64px;
      height: 64px;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .artwork img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .meta {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .now-playing-label {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .track-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 12px;
      opacity: 0.8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
    }

    .play-button {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: #ffffff;
      color: #111;
      flex-shrink: 0;
      font-size: 0;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, color 0.12s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.35);
    }

    .player-card.light .play-button {
      background: #111;
      color: #fff;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
    }

    .play-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.4);
    }

    .play-button:active {
      transform: translateY(0);
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3);
    }

    .play-icon {
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 7px 0 7px 11px;
      border-color: transparent transparent transparent currentColor;
      margin-left: 2px;
    }

    .pause-icon {
      display: flex;
      gap: 3px;
    }

    .pause-icon span {
      width: 3px;
      height: 12px;
      border-radius: 999px;
      background: currentColor;
    }

    .progress-bar {
      flex: 1;
      height: 3px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      overflow: hidden;
      position: relative;
    }

    .player-card.light .progress-bar {
      background: rgba(0, 0, 0, 0.08);
    }

    .progress-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0%;
      border-radius: inherit;
      background: #ffffff;
      opacity: 0.9;
      transition: width 0.15s linear;
    }

    .status-text {
      margin-top: 3px;
      font-size: 10px;
      opacity: 0.7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .unlicensed {
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(30, 0, 0, 0.95);
      border: 1px solid rgba(255, 80, 80, 0.6);
      max-width: 380px;
      width: 100%;
      color: #ffd7d7;
      font-size: 13px;
    }

    .unlicensed-title {
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .unlicensed-sub {
      font-size: 12px;
      opacity: 0.9;
    }

    @media (max-width: 420px) {
      .player-card,
      .unlicensed {
        margin: 6px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const DEFAULT_ARTWORK = "https://i.ibb.co/zTXzXnxR/Default-Player-Artwork.png";
    const DEFAULT_TITLE = "Radio Stream";
    const DEFAULT_ARTIST = "Live";

    function getQueryParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        streamUrl: params.get("streamUrl") || "",
        metaUrl: params.get("metaUrl") || "",
        licenseKey: params.get("licenseKey") || "",
        theme: (params.get("theme") || "dark").toLowerCase(),
        align: (params.get("align") || "center").toLowerCase()
      };
    }

    async function loadLicenses() {
      try {
        const res = await fetch("licenses.json", { cache: "no-store" });
        if (!res.ok) throw new Error("Failed to load licenses.json");
        return await res.json();
      } catch (e) {
        console.error("License load error:", e);
        return null;
      }
    }

    function isLicenseValid(licenses, key) {
      if (!licenses || !licenses.validKeys || !key) return false;
      const entry = licenses.validKeys.find((k) => k.key === key);
      if (!entry) return false;
      if (!entry.expires) return true;
      const today = new Date().toISOString().slice(0, 10);
      return entry.expires >= today;
    }

    function createUnlicensedView() {
      const wrap = document.createElement("div");
      wrap.className = "player-wrap";

      const card = document.createElement("div");
      card.className = "unlicensed";

      const title = document.createElement("div");
      title.className = "unlicensed-title";
      title.textContent = "Unlicensed Player";

      const sub = document.createElement("div");
      sub.className = "unlicensed-sub";
      sub.textContent =
        "This embedded player is not licensed. Please contact the provider for a valid license key.";

      card.appendChild(title);
      card.appendChild(sub);
      wrap.appendChild(card);
      return wrap;
    }

    function createPlayerView(theme, align) {
      const wrap = document.createElement("div");
      wrap.className = "player-wrap";
      wrap.style.justifyContent =
        align === "left"
          ? "flex-start"
          : align === "right"
          ? "flex-end"
          : "center";

      const card = document.createElement("div");
      card.className = "player-card";
      if (theme === "light") card.classList.add("light");

      const artwork = document.createElement("div");
      artwork.className = "artwork";
      const artImg = document.createElement("img");
      artImg.src = DEFAULT_ARTWORK;
      artImg.alt = "Artwork";
      artwork.appendChild(artImg);

      const meta = document.createElement("div");
      meta.className = "meta";

      const nowLabel = document.createElement("div");
      nowLabel.className = "now-playing-label";
      nowLabel.textContent = "Now Playing";

      const titleEl = document.createElement("div");
      titleEl.className = "track-title";
      titleEl.textContent = DEFAULT_TITLE;

      const artistEl = document.createElement("div");
      artistEl.className = "track-artist";
      artistEl.textContent = DEFAULT_ARTIST;

      const controlsRow = document.createElement("div");
      controlsRow.className = "controls-row";

      const playBtn = document.createElement("button");
      playBtn.className = "play-button";
      const playIcon = document.createElement("div");
      playIcon.className = "play-icon";
      playBtn.appendChild(playIcon);

      const progressBar = document.createElement("div");
      progressBar.className = "progress-bar";
      const progressFill = document.createElement("div");
      progressFill.className = "progress-fill";
      progressBar.appendChild(progressFill);

      controlsRow.appendChild(playBtn);
      controlsRow.appendChild(progressBar);

      const statusText = document.createElement("div");
      statusText.className = "status-text";
      statusText.textContent = "Ready";

      meta.appendChild(nowLabel);
      meta.appendChild(titleEl);
      meta.appendChild(artistEl);
      meta.appendChild(controlsRow);
      meta.appendChild(statusText);

      card.appendChild(artwork);
      card.appendChild(meta);
      wrap.appendChild(card);

      return {
        root: wrap,
        artImg,
        titleEl,
        artistEl,
        playBtn,
        progressFill,
        statusText
      };
    }

    function parseShoutcastXml(text) {
      try {
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, "text/xml");
        const songNode =
          doc.querySelector("SONGTITLE") ||
          doc.querySelector("songtitle") ||
          doc.querySelector("title");
        if (!songNode || !songNode.textContent) return null;
        const raw = songNode.textContent.trim();
        if (!raw) return null;

        let artist = "";
        let title = raw;
        const dashIndex = raw.indexOf(" - ");
        if (dashIndex > 0) {
          artist = raw.slice(0, dashIndex).trim();
          title = raw.slice(dashIndex + 3).trim();
        }

        return {
          artist: artist || "",
          title: title || raw
        };
      } catch (e) {
        console.error("XML parse error:", e);
        return null;
      }
    }

    async function fetchMetadata(metaUrl) {
      if (!metaUrl) return null;
      try {
        const res = await fetch(
          metaUrl + (metaUrl.includes("?") ? "&" : "?") + "t=" + Date.now(),
          { cache: "no-store" }
        );
        const contentType = res.headers.get("content-type") || "";
        const text = await res.text();

        if (contentType.includes("application/json")) {
          try {
            const json = JSON.parse(text);
            const artist =
              json.artist || json.Artist || json.artist_name || "";
            const title =
              json.title || json.Title || json.track || json.song || "";
            return { artist, title };
          } catch {
            // fall through
          }
        }

        return parseShoutcastXml(text);
      } catch (e) {
        console.error("Metadata fetch error:", e);
        return null;
      }
    }

    async function fetchArtwork(artist, title) {
      if (!artist && !title) return null;
      try {
        const query = encodeURIComponent(`${artist} ${title}`.trim());
        const res = await fetch(
          `https://itunes.apple.com/search?term=${query}&entity=song&limit=1`
        );
        if (!res.ok) return null;
        const data = await res.json();
        if (!data.results || !data.results.length) return null;
        const art = data.results[0].artworkUrl100 || "";
        if (!art) return null;
        return art.replace("100x100bb", "300x300bb");
      } catch (e) {
        console.error("Artwork fetch error:", e);
        return null;
      }
    }

    function setupAudio(streamUrl, ui) {
      if (!streamUrl) {
        ui.statusText.textContent =
          "No stream URL configured. Please provide a valid streamUrl parameter.";
        ui.playBtn.disabled = true;
        ui.playBtn.style.opacity = "0.6";
        return;
      }

      const audio = new Audio(streamUrl);
      audio.preload = "none";

      let isPlaying = false;
      let progress = 0;
      let progressTimer = null;

      function setPlayIcon() {
        ui.playBtn.innerHTML = "";
        const icon = document.createElement("div");
        icon.className = "play-icon";
        ui.playBtn.appendChild(icon);
      }

      function setPauseIcon() {
        ui.playBtn.innerHTML = "";
        const icon = document.createElement("div");
        icon.className = "pause-icon";
        const bar1 = document.createElement("span");
        const bar2 = document.createElement("span");
        icon.appendChild(bar1);
        icon.appendChild(bar2);
        ui.playBtn.appendChild(icon);
      }

      setPlayIcon();

      function startProgress() {
        if (progressTimer) return;
        progressTimer = setInterval(() => {
          progress = (progress + 1) % 100;
          ui.progressFill.style.width = progress + "%";
        }, 800);
      }

      function stopProgress() {
        if (progressTimer) {
          clearInterval(progressTimer);
          progressTimer = null;
        }
        ui.progressFill.style.width = "0%";
        progress = 0;
      }

      ui.playBtn.addEventListener("click", async () => {
        if (!isPlaying) {
          try {
            ui.statusText.textContent = "Connecting…";
            await audio.play();
            isPlaying = true;
            setPauseIcon();
            ui.statusText.textContent = "Live";
            startProgress();
          } catch (e) {
            console.error("Play error:", e);
            ui.statusText.textContent = "Playback failed.";
          }
        } else {
          audio.pause();
          isPlaying = false;
          setPlayIcon();
          ui.statusText.textContent = "Paused";
          stopProgress();
        }
      });

      audio.addEventListener("error", () => {
        ui.statusText.textContent = "Stream error.";
      });
    }

    async function init() {
      const params = getQueryParams();
      const app = document.getElementById("app");

      const licenses = await loadLicenses();
      const valid = isLicenseValid(licenses, params.licenseKey);

      if (!valid) {
        app.appendChild(createUnlicensedView());
        return;
      }

      const ui = createPlayerView(params.theme, params.align);
      app.appendChild(ui.root);

      setupAudio(params.streamUrl, ui);

      async function updateMeta() {
        const meta = await fetchMetadata(params.metaUrl);
        if (!meta || (!meta.artist && !meta.title)) {
          ui.titleEl.textContent = DEFAULT_TITLE;
          ui.artistEl.textContent = DEFAULT_ARTIST;
          ui.statusText.textContent = "Live";
          ui.artImg.src = DEFAULT_ARTWORK;
          return;
        }

        ui.titleEl.textContent = meta.title || DEFAULT_TITLE;
        ui.artistEl.textContent = meta.artist || DEFAULT_ARTIST;
        ui.statusText.textContent = "Live";

        const art = await fetchArtwork(meta.artist, meta.title);
        ui.artImg.src = art || DEFAULT_ARTWORK;
      }

      updateMeta();
      setInterval(updateMeta, 15000);
    }

    init();
  </script>
</body>
</html>
